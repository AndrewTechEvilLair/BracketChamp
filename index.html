<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BracketChamp</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { margin: 0; }
    }
    @media screen { .print-only { display: none; } }
    .touch-manipulation { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const VERSION = 'V1.4';

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  participants: [''],
  bracket: null,
  includeLosers: false,
  customBracketSize: '',
  tournamentName: '',
  seedingMode: 'random',
  darkMode: false,
  history: [],
  showSettings: false,
  isMobile: window.innerWidth < 768,
  currentRound: 0,
  pendingFinal: null,
  grandFinal: null,
  showResetModal: false,
  showExportDropdown: false,
  finalStandings: null,
  showStandingsModal: false,
  touchStartX: 0,
};

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { state.isMobile = window.innerWidth < 768; render(); });

setInterval(() => {
  localStorage.setItem('bracketChampState', JSON.stringify({
    participants: state.participants,
    tournamentName: state.tournamentName,
    darkMode: state.darkMode,
    seedingMode: state.seedingMode,
    includeLosers: state.includeLosers,
  }));
}, 2000);

try {
  const saved = JSON.parse(localStorage.getItem('bracketChampState') || '{}');
  if (saved.participants) state.participants = saved.participants;
  if (saved.tournamentName) state.tournamentName = saved.tournamentName;
  if (saved.darkMode !== undefined) state.darkMode = saved.darkMode;
  if (saved.seedingMode) state.seedingMode = saved.seedingMode;
  if (saved.includeLosers !== undefined) state.includeLosers = saved.includeLosers;
} catch(e) {}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRoundName(roundIndex, totalRounds) {
  const r = totalRounds - roundIndex;
  if (r === 1) return 'Final';
  if (r === 2) return 'Semi-Final';
  if (r === 3) return 'Quarter-Final';
  return 'Round ' + (roundIndex + 1);
}

function getLBRoundName(lri) {
  return lri % 2 === 0 ? 'LB Rd ' + (Math.floor(lri/2)+1) : 'LB Rd ' + (Math.floor(lri/2)+1) + 'B';
}

// ─── BRACKET GENERATION ───────────────────────────────────────────────────────
function generateLosersBracket(rounds) {
  const lb = [];
  for (let lr = 0; lr < 2 * (rounds - 1); lr++) {
    const matchCount = Math.pow(2, rounds - 2 - Math.floor(lr / 2));
    const round = [];
    for (let i = 0; i < matchCount; i++) {
      round.push({ match: i+1, player1:'', player2:'', winner:'', timestamp:null });
    }
    lb.push(round);
  }
  return lb;
}

function generateBracket(blank32, customSize) {
  blank32 = blank32 || false; customSize = customSize || null;
  let filledParticipants, bracketSize;

  if (customSize) {
    const size = parseInt(customSize);
    if (isNaN(size) || size < 2 || size > 64) { alert('Enter a number between 2 and 64'); return; }
    bracketSize = size;
    filledParticipants = Array(bracketSize).fill('').map((_,i) => 'Racer '+(i+1));
  } else if (blank32) {
    filledParticipants = Array(32).fill('').map((_,i) => 'Racer '+(i+1));
    bracketSize = 32;
  } else {
    const valid = state.participants.filter(p => p && p.trim());
    if (valid.length < 2) { alert('Please enter at least 2 participants'); return; }
    filledParticipants = state.seedingMode === 'random' ? shuffleArray(valid) : [...valid];
    bracketSize = filledParticipants.length;
  }

  const rounds = Math.ceil(Math.log2(bracketSize));
  const perfect = Math.pow(2, rounds);
  const byesNeeded = perfect - filledParticipants.length;
  for (let i = 0; i < byesNeeded; i++) filledParticipants.push('BYE');
  if (byesNeeded > 0 && !blank32 && !customSize && state.seedingMode === 'random') {
    filledParticipants = shuffleArray(filledParticipants);
  }

  const firstRound = [];
  for (let i = 0; i < filledParticipants.length; i += 2) {
    const m = { match: Math.floor(i/2)+1, player1: filledParticipants[i], player2: filledParticipants[i+1], winner:'', timestamp:null };
    if (m.player1 === 'BYE' && m.player2 !== 'BYE') m.winner = m.player2;
    else if (m.player2 === 'BYE' && m.player1 !== 'BYE') m.winner = m.player1;
    firstRound.push(m);
  }

  const winners = [firstRound];
  for (let r = 1; r < rounds; r++) {
    const count = Math.pow(2, rounds - r - 1);
    winners.push(Array(count).fill(null).map((_,i) => ({ match:i+1, player1:'', player2:'', winner:'', timestamp:null })));
  }

  // Auto-advance BYE winners
  firstRound.forEach((m, idx) => {
    if (m.winner && winners[1]) {
      const nm = winners[1][Math.floor(idx/2)];
      if (idx % 2 === 0) nm.player1 = m.winner; else nm.player2 = m.winner;
    }
  });

  state.bracket = {
    winners,
    losers: state.includeLosers ? generateLosersBracket(rounds) : null,
    rounds,
    name: state.tournamentName || 'Unnamed Tournament',
    createdAt: new Date().toISOString(),
    finalStandings: null,
    grandFinal: null,
  };
  state.history = [];
  state.grandFinal = null;
  state.finalStandings = null;
  state.currentRound = 0;
  state.pendingFinal = null;
  if (customSize) state.customBracketSize = '';
  render();
}

// ─── WINNER SELECTION ─────────────────────────────────────────────────────────
function feedLoser(nb, wRoundIndex, wMatchIndex, loser) {
  if (!nb.losers) return;
  const lrIndex = wRoundIndex === 0 ? 0 : wRoundIndex * 2 - 1;
  if (lrIndex >= nb.losers.length) return;
  const lRound = nb.losers[lrIndex];
  if (wRoundIndex === 0) {
    const lmi = Math.floor(wMatchIndex / 2);
    if (!lRound[lmi]) return;
    if (wMatchIndex % 2 === 0) lRound[lmi].player1 = loser;
    else lRound[lmi].player2 = loser;
  } else {
    if (!lRound[wMatchIndex]) return;
    lRound[wMatchIndex].player2 = loser;
  }
}

function doSelectWinnerInLosers(lRoundIndex, lMatchIndex, winner, nb) {
  const m = nb.losers[lRoundIndex][lMatchIndex];
  m.winner = winner; m.timestamp = new Date().toISOString();
  const next = lRoundIndex + 1;
  if (next >= nb.losers.length) return;
  const nextIsDropIn = next % 2 === 1;
  if (nextIsDropIn) {
    const nm = nb.losers[next][lMatchIndex];
    if (nm) nm.player1 = winner;
  } else {
    const nmi = Math.floor(lMatchIndex / 2);
    const nm = nb.losers[next][nmi];
    if (nm) { if (lMatchIndex % 2 === 0) nm.player1 = winner; else nm.player2 = winner; }
  }
}

window.selectLoserWinner = function(lRoundIndex, lMatchIndex, playerNum) {
  if (!state.bracket) return;
  const match = state.bracket.losers[lRoundIndex][lMatchIndex];
  const winner = playerNum === 1 ? match.player1 : match.player2;
  if (!winner || winner === 'TBD') return;
  state.history.push(JSON.parse(JSON.stringify(state.bracket)));
  const nb = JSON.parse(JSON.stringify(state.bracket));
  if (navigator.vibrate) navigator.vibrate(50);
  doSelectWinnerInLosers(lRoundIndex, lMatchIndex, winner, nb);
  state.bracket = nb;
  const isLastLB = lRoundIndex === nb.losers.length - 1;
  if (isLastLB) {
    const wChamp = nb.winners[nb.rounds-1][0] && nb.winners[nb.rounds-1][0].winner;
    if (wChamp) {
      setTimeout(() => { state.grandFinal = { wChampion: wChamp, lbChampion: winner, winner:'' }; render(); }, 100);
      return;
    }
  }
  render();
};

window.clearLoserWinner = function(lRoundIndex, lMatchIndex) {
  if (!state.bracket) return;
  state.history.push(JSON.parse(JSON.stringify(state.bracket)));
  const nb = JSON.parse(JSON.stringify(state.bracket));
  nb.losers[lRoundIndex][lMatchIndex].winner = '';
  nb.losers[lRoundIndex][lMatchIndex].timestamp = null;
  state.bracket = nb;
  render();
};

function computeStandings(nb, gf) {
  const eliminated = {};
  nb.winners.forEach((round, ri) => {
    round.forEach(m => {
      if (!m.winner || m.player1 === 'BYE' || m.player2 === 'BYE') return;
      const loser = m.winner === m.player1 ? m.player2 : m.player1;
      if (!loser) return;
      if (nb.losers) eliminated[loser] = { bracket:'W', roundIndex:ri, dropped:true };
      else eliminated[loser] = { bracket:'W', roundIndex:ri, dropped:false };
    });
  });
  if (nb.losers) {
    nb.losers.forEach((round, lri) => {
      round.forEach(m => {
        if (!m.winner) return;
        const loser = m.winner === m.player1 ? m.player2 : m.player1;
        if (loser) eliminated[loser] = { bracket:'L', roundIndex:lri, dropped:false };
      });
    });
  }
  const loser = gf.winner === gf.wChampion ? gf.lbChampion : gf.wChampion;
  const champion = gf.winner;
  const sorted = Object.entries(eliminated)
    .filter(([p]) => p !== champion && p !== loser)
    .sort((a,b) => {
      const sa = a[1].bracket === 'L' ? a[1].roundIndex+1000 : a[1].roundIndex;
      const sb = b[1].bracket === 'L' ? b[1].roundIndex+1000 : b[1].roundIndex;
      return sb - sa;
    });
  const standings = [
    { place:1, player:champion, note:'🏆 Tournament Champion' },
    { place:2, player:loser, note: gf.winner===gf.wChampion ? 'Losers Bracket Champion' : 'Winners Bracket Champion' },
  ];
  let place = 3, i = 0;
  while (i < sorted.length) {
    const curr = sorted[i][1];
    let j = i+1;
    while (j < sorted.length && sorted[j][1].bracket===curr.bracket && sorted[j][1].roundIndex===curr.roundIndex) j++;
    const group = sorted.slice(i,j).map(([p])=>p);
    const label = group.length > 1 ? 'T-'+place : ''+place;
    group.forEach(p => standings.push({ place:label, player:p, note:'' }));
    place += group.length; i = j;
  }
  return standings;
}

window.confirmGrandFinalWinner = function(playerNum) {
  if (!state.grandFinal) return;
  const winner = playerNum === 1 ? state.grandFinal.wChampion : state.grandFinal.lbChampion;
  const gf = { ...state.grandFinal, winner, timestamp: new Date().toISOString() };
  state.grandFinal = gf;
  const nb = JSON.parse(JSON.stringify(state.bracket));
  nb.grandFinal = gf;
  const standings = computeStandings(nb, gf);
  nb.finalStandings = standings;
  state.bracket = nb;
  state.finalStandings = standings;
  state.showStandingsModal = true;
  render();
};

function doSelectWinner(roundIndex, matchIndex, winner) {
  state.history.push(JSON.parse(JSON.stringify(state.bracket)));
  const nb = JSON.parse(JSON.stringify(state.bracket));
  const m = nb.winners[roundIndex][matchIndex];
  const loser = m.player1 === winner ? m.player2 : m.player1;
  m.winner = winner; m.timestamp = new Date().toISOString();
  if (navigator.vibrate) navigator.vibrate(50);

  if (roundIndex < nb.rounds - 1) {
    const nm = nb.winners[roundIndex+1][Math.floor(matchIndex/2)];
    if (matchIndex % 2 === 0) nm.player1 = winner; else nm.player2 = winner;
  }
  if (nb.losers && loser && loser !== 'BYE' && loser !== '') {
    feedLoser(nb, roundIndex, matchIndex, loser);
  }
  state.bracket = nb;

  if (roundIndex === nb.rounds - 1 && !nb.losers) {
    // Single elim final — compute standings
    const elim = {};
    nb.winners.forEach((round, ri) => {
      round.forEach(m2 => {
        if (!m2.winner || m2.player1 === 'BYE' || m2.player2 === 'BYE') return;
        const l = m2.winner === m2.player1 ? m2.player2 : m2.player1;
        if (l) elim[l] = ri;
      });
    });
    const sorted = Object.entries(elim).filter(([p])=>p!==winner).sort((a,b)=>b[1]-a[1]);
    const stList = [{ place:1, player:winner, note:'🏆 Tournament Champion' }];
    let pl = 2, si = 0;
    while (si < sorted.length) {
      const ri = sorted[si][1]; let sj = si+1;
      while (sj < sorted.length && sorted[sj][1]===ri) sj++;
      const group = sorted.slice(si,sj).map(([p])=>p);
      const lbl = group.length>1 ? 'T-'+pl : ''+pl;
      group.forEach(p => stList.push({ place:lbl, player:p, note:'' }));
      pl += group.length; si = sj;
    }
    nb.finalStandings = stList;
    state.bracket = nb;
    state.finalStandings = stList;
    state.showStandingsModal = true;
  }
  render();
}

window.selectWinner = function(roundIndex, matchIndex, playerNum) {
  if (!state.bracket) return;
  const m = state.bracket.winners[roundIndex][matchIndex];
  const winner = playerNum === 1 ? m.player1 : m.player2;
  if (!winner || winner === 'TBD' || winner === 'BYE') return;
  if (roundIndex === state.bracket.rounds - 1) {
    state.pendingFinal = { roundIndex, matchIndex, winner };
    render(); return;
  }
  doSelectWinner(roundIndex, matchIndex, winner);
};

window.confirmFinalWinner = function() {
  if (!state.pendingFinal) return;
  const { roundIndex, matchIndex, winner } = state.pendingFinal;
  state.pendingFinal = null;
  doSelectWinner(roundIndex, matchIndex, winner);
};

window.cancelFinal = function() { state.pendingFinal = null; render(); };

window.clearWinner = function(roundIndex, matchIndex) {
  state.history.push(JSON.parse(JSON.stringify(state.bracket)));
  const nb = JSON.parse(JSON.stringify(state.bracket));
  nb.winners[roundIndex][matchIndex].winner = '';
  nb.winners[roundIndex][matchIndex].timestamp = null;
  state.bracket = nb;
  render();
};

window.undoLastAction = function() {
  if (state.history.length > 0) { state.bracket = state.history.pop(); render(); }
};

// ─── PARTICIPANTS ─────────────────────────────────────────────────────────────
window.addParticipant = function() {
  if (state.participants.length < 32) { state.participants.push(''); render(); }
};
window.removeParticipant = function(i) {
  state.participants = state.participants.filter((_,idx)=>idx!==i);
  if (state.participants.length===0) state.participants=[''];
  render();
};
window.updateParticipant = function(i, val) { state.participants[i]=val; };
window.populateTestData = function() {
  state.participants = ['Mickey Mouse','Bugs Bunny','SpongeBob','Homer Simpson','Scooby-Doo','Tom Cat','Jerry Mouse','Donald Duck','Bart Simpson','Patrick Star','Tweety Bird','Road Runner','Daffy Duck','Porky Pig','Goofy','Pluto','Woody Woodpecker','Fred Flintstone','Barney Rubble','Yogi Bear','Peter Griffin','Stewie Griffin','Eric Cartman','Kenny McCormick','Pikachu','Garfield','Sonic','Mario','Luigi','Popeye','Betty Boop','Felix the Cat'];
  render();
};

// ─── NAV / SETTINGS ───────────────────────────────────────────────────────────
window.backToEntry = function() { state.bracket=null; state.grandFinal=null; state.finalStandings=null; render(); };
window.toggleDarkMode = function() { state.darkMode=!state.darkMode; render(); };
window.setSeedingMode = function(v) { state.seedingMode=v; render(); };
window.setIncludeLosers = function(v) { state.includeLosers=v; render(); };
window.setTournamentName = function(v) { state.tournamentName=v; };
window.setCustomSize = function(v) { state.customBracketSize=v; };
window.setCurrentRound = function(i) { state.currentRound=i; render(); };

window.openResetModal = function() { state.showResetModal=true; render(); };
window.closeResetModal = function() { state.showResetModal=false; render(); };
window.doReset = function() {
  state.participants=[''];state.bracket=null;state.history=[];state.grandFinal=null;
  state.finalStandings=null;state.tournamentName='';state.showResetModal=false;
  localStorage.removeItem('bracketChampState');
  render();
};

window.toggleExportDropdown = function() { state.showExportDropdown=!state.showExportDropdown; render(); };
window.closeExportDropdown = function() { state.showExportDropdown=false; render(); };

window.openStandings = function() { state.showStandingsModal=true; render(); };
window.closeStandings = function() { state.showStandingsModal=false; render(); };

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function buildASCIIBracket(ab) {
  const W = 22;
  const pad = (s,w) => { s=String(s||''); if(s.length>w-2)s=s.slice(0,w-5)+'...'; return s.padEnd(w); };
  const renderSide = (roundsList, label) => {
    let out = '\n'+label+'\n'+'─'.repeat(label.length)+'\n';
    const nr = roundsList.length, fc = roundsList[0].length;
    const grid = [];
    for(let s=0;s<fc*4;s++) grid.push(Array(nr).fill(''));
    roundsList.forEach((round,ri) => {
      const spm = Math.pow(2,ri);
      round.forEach((m,mi) => {
        if(!m.player1&&!m.player2) return;
        const fs = mi*spm*2, ms = fs+spm-1;
        const p1=(m.winner===m.player1?'* ':'  ')+(m.player1||'TBD');
        const p2=(m.winner===m.player2?'* ':'  ')+(m.player2||'TBD');
        if(ri<nr-1){grid[ms][ri]=pad((m.winner===m.player1?'* ':'  ')+(m.player1||'TBD'),W-1)+'>';}
        else{grid[fs][ri]=pad(p1,W);}
        if(ri<nr-1){grid[ms+1][ri]=pad((m.winner===m.player2?'* ':'  ')+(m.player2||'TBD'),W-1)+'>';}
        else{grid[ms+1][ri]=pad(p2,W);}
        for(let s2=fs+1;s2<=ms;s2++){if(!grid[s2][ri])grid[s2][ri]=' '.repeat(W-1)+'|';}
        for(let s2=ms+2;s2<fs+spm*2;s2++){if(!grid[s2][ri])grid[s2][ri]=' '.repeat(W-1)+'|';}
      });
    });
    const hdrs = roundsList.map((_,ri)=>{ const rem=nr-ri; return(rem===1?'Final':rem===2?'Semi':rem===3?'Quarter':'Rd '+(ri+1)).padEnd(W); });
    out+=hdrs.join(' ')+'\n'; out+=hdrs.map(h=>'─'.repeat(h.length)).join(' ')+'\n';
    grid.forEach(row=>{ const line=row.map(c=>c||' '.repeat(W)).join(' ').trimEnd(); if(line.trim())out+=line+'\n'; });
    return out;
  };
  let d = renderSide(ab.winners,'WINNERS BRACKET');
  if(ab.losers&&ab.losers.length>0) d+=renderSide(ab.losers,'LOSERS BRACKET');
  if(ab.grandFinal){
    const gf=ab.grandFinal;
    d+='\nGRAND FINAL\n───────────\n';
    d+='  '+(gf.winner===gf.wChampion?'*':' ')+' '+gf.wChampion+' (W Bracket)\n';
    d+='  '+(gf.winner===gf.lbChampion?'*':' ')+' '+gf.lbChampion+' (L Bracket)\n';
    if(gf.winner) d+='\n  🏆 CHAMPION: '+gf.winner+'\n';
  }
  return d;
}

function buildResults(ab) {
  const results = {};
  ab.winners.forEach((round,ri) => {
    const rn = getRoundName(ri,ab.rounds);
    round.forEach(m => {
      if(!m.player1||!m.player2||m.player1==='BYE'||m.player2==='BYE'||!m.winner) return;
      [m.player1,m.player2].forEach(p => { if(!results[p]) results[p]=[]; });
      const r1=m.winner===m.player1?'W':'L', r2=m.winner===m.player2?'W':'L';
      results[m.player1].push({round:rn,match:m.match,opponent:m.player2,result:r1,timestamp:m.timestamp});
      results[m.player2].push({round:rn,match:m.match,opponent:m.player1,result:r2,timestamp:m.timestamp});
    });
  });
  return results;
}

window.exportTXT = function() {
  const ab = state.bracket; if(!ab) return;
  const results = buildResults(ab);
  let o = '='.repeat(60)+'\n';
  o += ab.name.toUpperCase()+'\n';
  o += 'BRACKETCHAMP '+VERSION+' — TOURNAMENT RESULTS\n';
  o += '='.repeat(60)+'\n\n';
  o += 'Generated: '+new Date().toLocaleString()+'\n';
  o += 'Tournament Date: '+new Date(ab.createdAt).toLocaleDateString()+'\n';
  const champ = (ab.grandFinal&&ab.grandFinal.winner)||ab.winners[ab.rounds-1][0].winner||'';
  if(champ) o += 'Tournament Champion: '+champ+'\n';
  o += '\n';
  if(ab.finalStandings){
    o += '='.repeat(60)+'\n';
    o += 'FINAL STANDINGS\n';
    o += '='.repeat(60)+'\n';
    ab.finalStandings.forEach(e => {
      const ps = String(e.place).padEnd(6);
      const med = e.place===1?' [CHAMPION]':e.place===2?' [Runner-up]':'';
      o += '  '+ps+'  '+e.player+med+'\n';
    });
    o += '\n';
  }
  o += buildASCIIBracket(ab);
  o += '\n\n='.repeat(30)+'\nRACE-BY-RACE RESULTS\n'+'='.repeat(60)+'\n\n';
  Object.keys(results).sort().forEach(racer => {
    const races = results[racer]; if(!races.length) return;
    o += '-'.repeat(60)+'\nRacer: '+racer+'\n'+'-'.repeat(60)+'\n';
    races.forEach((r,idx) => {
      o += (idx+1)+'. '+r.round+' - Match '+r.match+'\n';
      o += '   vs '+r.opponent+'\n';
      o += '   Result: '+(r.result==='W'?'WIN':'LOSS')+'\n';
      if(r.timestamp) o += '   Time: '+new Date(r.timestamp).toLocaleString()+'\n';
      o += '\n';
    });
    const w=races.filter(r=>r.result==='W').length, l=races.filter(r=>r.result==='L').length;
    o += 'Summary: '+w+'W - '+l+'L\n\n';
  });
  download(ab.name.replace(/\s+/g,'-')+'-results.txt', o, 'text/plain');
  state.showExportDropdown=false; render();
};

window.exportCSV = function() {
  const ab = state.bracket; if(!ab) return;
  const results = buildResults(ab);
  let c = '';
  if(ab.finalStandings){
    c += 'FINAL STANDINGS\nPlace,Player\n';
    ab.finalStandings.forEach(e => c += '"'+e.place+'","'+e.player+'"\n');
    c += '\n';
  }
  c += 'RACE RESULTS\nRacer,Round,Match,Opponent,Result,Timestamp\n';
  Object.keys(results).sort().forEach(racer => {
    results[racer].forEach(r => {
      c += '"'+racer+'","'+r.round+'",'+r.match+',"'+r.opponent+'","'+r.result+'","'+(r.timestamp||'')+'"\n';
    });
  });
  download(ab.name.replace(/\s+/g,'-')+'-results.csv', c, 'text/csv');
  state.showExportDropdown=false; render();
};

window.exportJSON = function() {
  const ab = state.bracket; if(!ab) return;
  download(ab.name.replace(/\s+/g,'-')+'-bracket.json', JSON.stringify(ab,null,2), 'application/json');
  state.showExportDropdown=false; render();
};

function download(filename, text, type) {
  const blob = new Blob([text],{type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ─── BRACKET SCREEN ───────────────────────────────────────────────────────────
function renderBracketScreen() {
  const b = state.bracket;
  const matchHeight = 190, slotHeight = 210;
  const firstCount = b.winners[0].length;
  const totalHeight = firstCount * slotHeight;

  function getTop(roundIndex, matchIndex) {
    const spm = Math.pow(2, roundIndex);
    const firstSlot = matchIndex * spm;
    const centerSlot = firstSlot + spm/2 - 0.5;
    return centerSlot * slotHeight + (slotHeight/2) - (matchHeight/2);
  }

  function getLTop(lri, lmi) {
    const spm = Math.pow(2, Math.floor(lri/2));
    const firstSlot = lmi * spm;
    const centerSlot = firstSlot + spm/2 - 0.5;
    return centerSlot * slotHeight + (slotHeight/2) - (matchHeight/2);
  }

  function matchCard(match, roundIndex, matchIndex, isLoser) {
    const accent = isLoser ? 'red' : 'blue';
    const bg2 = c('bg-gray-700','bg-gray-50');
    const p1win = match.winner && match.winner === match.player1;
    const p2win = match.winner && match.winner === match.player2;

    const p1Cls = p1win
      ? 'bg-green-100 border-green-500 font-bold text-green-900'
      : match.player1 && match.player1 !== 'TBD' && match.player1 !== 'BYE'
        ? c('bg-gray-600 border-gray-500 text-gray-100 hover:bg-gray-500','bg-white border-gray-300 hover:bg-blue-50 cursor-pointer')
        : 'opacity-40 cursor-not-allowed ' + c('bg-gray-600 border-gray-500 text-gray-400','bg-white border-gray-200 text-gray-400');
    const p2Cls = p2win
      ? 'bg-green-100 border-green-500 font-bold text-green-900'
      : match.player2 && match.player2 !== 'TBD' && match.player2 !== 'BYE'
        ? c('bg-gray-600 border-gray-500 text-gray-100 hover:bg-gray-500','bg-white border-gray-300 hover:bg-blue-50 cursor-pointer')
        : 'opacity-40 cursor-not-allowed ' + c('bg-gray-600 border-gray-500 text-gray-400','bg-white border-gray-200 text-gray-400');

    const p1Disabled = !match.player1 || match.player1==='TBD' || match.player1==='BYE';
    const p2Disabled = !match.player2 || match.player2==='TBD' || match.player2==='BYE';

    const onclick1 = isLoser
      ? `onclick="selectLoserWinner(${roundIndex},${matchIndex},1)"`
      : `onclick="selectWinner(${roundIndex},${matchIndex},1)"`;
    const onclick2 = isLoser
      ? `onclick="selectLoserWinner(${roundIndex},${matchIndex},2)"`
      : `onclick="selectWinner(${roundIndex},${matchIndex},2)"`;
    const clearOnclick = isLoser
      ? `onclick="clearLoserWinner(${roundIndex},${matchIndex})"`
      : `onclick="clearWinner(${roundIndex},${matchIndex})"`;

    return `
    <div class="border ${bdr()} rounded-lg p-3 ${bg2} w-full shadow" style="min-width:200px;">
      <div class="flex justify-between items-center mb-2">
        <span class="text-xs font-bold ${c('text-gray-400',isLoser?'text-red-500':'text-gray-500')}">Match ${match.match}</span>
        ${match.winner ? `<button ${clearOnclick} title="Clear winner" class="text-red-400 hover:text-red-600 no-print">🗑</button>` : ''}
      </div>
      <button ${p1Disabled?'disabled':onclick1} class="w-full p-2 rounded border-2 text-sm text-left transition-all touch-manipulation ${p1Cls}">
        ${esc(match.player1||'TBD')}${p1win?' ✓':''}
      </button>
      <div class="text-center text-xs ${c('text-gray-500','text-gray-400')} my-1">VS</div>
      <button ${p2Disabled?'disabled':onclick2} class="w-full p-2 rounded border-2 text-sm text-left transition-all touch-manipulation ${p2Cls}">
        ${esc(match.player2||'TBD')}${p2win?' ✓':''}
      </button>
      ${match.winner ? `<div class="mt-2 text-xs text-green-600 font-semibold">Winner: ${esc(match.winner)}</div>` : ''}
      ${match.timestamp ? `<div class="mt-1 text-xs ${c('text-gray-500','text-gray-400')}">🕐 ${new Date(match.timestamp).toLocaleTimeString()}</div>` : ''}
    </div>`;
  }

  // ── Winners bracket columns ──
  let wCols = b.winners.map((round, ri) => {
    const colBg = ri % 2 === 0
      ? c('bg-gray-800','bg-white')
      : c('bg-gray-750','bg-gray-50');
    // manually alternate since Tailwind won't compute
    const colStyle = ri % 2 === 1
      ? `style="background:${state.darkMode?'#1e293b':'#f9fafb'}"`
      : '';
    const header = getRoundName(ri, b.rounds);
    let cards = '';
    round.forEach((match, mi) => {
      if (!match.player1 && !match.player2) return;
      const top = getTop(ri, mi);
      cards += `<div class="absolute" style="top:${top}px;left:8px;right:8px;">${matchCard(match,ri,mi,false)}</div>`;
    });
    return `
    <div class="flex flex-col flex-shrink-0" style="width:220px;">
      <div class="bg-blue-600 text-white px-4 py-2 rounded-t-lg text-center font-bold text-sm">${header}</div>
      <div class="relative border-l-4 border-r-4 border-blue-200" style="height:${totalHeight}px;">
        ${cards}
      </div>
    </div>`;
  }).join('');

  // ── Losers bracket columns ──
  let lbSection = '';
  if (b.losers && b.losers.length > 0) {
    const lbFirstCount = b.losers[0].length;
    const lbTotalH = lbFirstCount * slotHeight;
    const lbCols = b.losers.map((round, lri) => {
      let cards = '';
      round.forEach((match, mi) => {
        if (!match.player1 && !match.player2) return;
        const top = getLTop(lri, mi);
        cards += `<div class="absolute" style="top:${top}px;left:8px;right:8px;">${matchCard(match,lri,mi,true)}</div>`;
      });
      return `
      <div class="flex flex-col flex-shrink-0" style="width:220px;">
        <div class="bg-red-600 text-white px-4 py-2 rounded-t-lg text-center font-bold text-sm">${getLBRoundName(lri)}</div>
        <div class="relative border-l-4 border-r-4 border-red-200" style="height:${lbTotalH}px;">
          ${cards}
        </div>
      </div>`;
    }).join('');

    lbSection = `
    <div class="${card()} rounded-lg shadow-lg p-4 md:p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4 text-center ${c('text-red-300','text-red-600')}">Losers Bracket</h2>
      <div class="overflow-x-auto pb-4">
        <div class="flex gap-6 min-w-max">${lbCols}</div>
      </div>
    </div>`;
  }

  // ── Grand Final section (if double elim and both champs decided) ──
  let grandFinalSection = '';
  if (b.grandFinal && b.grandFinal.winner) {
    grandFinalSection = `
    <div class="${card()} rounded-lg shadow-lg p-6 mb-6 border-4 border-yellow-400">
      <h2 class="text-xl font-bold text-center text-yellow-600 mb-4">🏆 Grand Final Result</h2>
      <div class="text-center">
        <div class="text-2xl font-bold ${txt()}">${esc(b.grandFinal.winner)}</div>
        <div class="text-green-600 font-semibold">Tournament Champion!</div>
      </div>
    </div>`;
  }

  // ── Modals ──
  let modals = '';

  // Reset modal
  if (state.showResetModal) {
    modals += `
    <div class="modal-backdrop" onclick="closeResetModal()">
      <div class="${card()} rounded-xl shadow-2xl p-6 max-w-sm w-full" onclick="event.stopPropagation()">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">🔄</div>
          <h2 class="text-xl font-bold ${txt()}">Reset Tournament?</h2>
          <p class="mt-2 text-sm ${c('text-gray-400','text-gray-500')}">This will clear everything. Cannot be undone.</p>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="closeResetModal()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-semibold">Cancel</button>
          <button onclick="doReset()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-semibold">Reset Everything</button>
        </div>
      </div>
    </div>`;
  }

  // Pending final confirmation
  if (state.pendingFinal) {
    const isDouble = !!b.losers;
    modals += `
    <div class="modal-backdrop">
      <div class="${card()} rounded-xl shadow-2xl p-6 max-w-sm w-full">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">🏆</div>
          <h2 class="text-xl font-bold ${txt()}">${isDouble ? 'Winners Bracket Final!' : 'Final Match!'}</h2>
          <p class="mt-2 ${c('text-gray-300','text-gray-600')}">
            Declare <strong class="text-green-600">${esc(state.pendingFinal.winner)}</strong> as ${isDouble ? 'Winners Bracket champion' : 'Tournament Champion'}?
          </p>
          ${isDouble ? `<p class="text-sm text-orange-500 mt-1">The loser advances to the Grand Final vs the Losers Bracket champion.</p>` : ''}
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="cancelFinal()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-semibold">Cancel</button>
          <button onclick="confirmFinalWinner()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold">Confirm!</button>
        </div>
      </div>
    </div>`;
  }

  // Grand Final pick modal
  if (state.grandFinal && !state.grandFinal.winner) {
    modals += `
    <div class="modal-backdrop">
      <div class="${card()} rounded-xl shadow-2xl p-6 max-w-md w-full">
        <div class="text-center mb-6">
          <div class="text-5xl mb-2">🏆</div>
          <h2 class="text-2xl font-bold ${txt()}">GRAND FINAL</h2>
          <p class="text-sm ${c('text-gray-400','text-gray-500')} mt-1">Winners Bracket Champion vs Losers Bracket Champion</p>
        </div>
        <div class="space-y-3 mb-4">
          <button onclick="confirmGrandFinalWinner(1)" class="w-full p-4 rounded-lg border-2 text-left font-semibold transition-all hover:border-yellow-400 ${c('bg-gray-700 border-gray-500 text-gray-100','bg-white border-gray-300')}">
            <span class="text-xs text-blue-500 block mb-1">Winners Bracket Champion</span>
            ${esc(state.grandFinal.wChampion)}
          </button>
          <div class="text-center text-sm font-bold ${c('text-gray-500','text-gray-400')}">VS</div>
          <button onclick="confirmGrandFinalWinner(2)" class="w-full p-4 rounded-lg border-2 text-left font-semibold transition-all hover:border-yellow-400 ${c('bg-gray-700 border-gray-500 text-gray-100','bg-white border-gray-300')}">
            <span class="text-xs text-red-500 block mb-1">Losers Bracket Champion</span>
            ${esc(state.grandFinal.lbChampion)}
          </button>
        </div>
        <p class="text-xs text-center ${c('text-gray-500','text-gray-400')}">Click the winner to complete the tournament</p>
      </div>
    </div>`;
  }

  // Final Standings modal
  if (state.showStandingsModal && state.finalStandings) {
    const rows = state.finalStandings.map(e => {
      const medal = e.place===1?'🥇':e.place===2?'🥈':e.place===3?'🥉':'';
      const rowBg = e.place===1?'bg-yellow-100 border-2 border-yellow-400':e.place===2?'bg-gray-100 border border-gray-300':e.place===3?'bg-orange-50 border border-orange-200':(state.darkMode?'bg-gray-700':'bg-gray-50');
      return `
      <div class="flex items-center gap-3 p-3 rounded-lg ${rowBg}">
        <span class="text-xl w-10 text-center">${medal||('#'+e.place)}</span>
        <div class="flex-1">
          <div class="font-semibold ${txt()}">${esc(e.player)}</div>
          ${e.note?`<div class="text-xs text-green-600">${e.note}</div>`:''}
        </div>
      </div>`;
    }).join('');
    modals += `
    <div class="modal-backdrop" onclick="closeStandings()">
      <div class="${card()} rounded-xl shadow-2xl p-6 max-w-md w-full max-h-screen overflow-y-auto" onclick="event.stopPropagation()">
        <div class="text-center mb-6">
          <div class="text-4xl mb-2">🏆</div>
          <h2 class="text-2xl font-bold ${txt()}">Final Standings</h2>
          <p class="text-sm ${c('text-gray-400','text-gray-500')}">${esc(b.name)}</p>
        </div>
        <div class="space-y-2 mb-6">${rows}</div>
        <div class="flex gap-3">
          <button onclick="closeStandings()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-semibold">Close</button>
          <button onclick="exportTXT()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2">
            📥 Export
          </button>
        </div>
      </div>
    </div>`;
  }

  // Champion banner
  const champBanner = (b.grandFinal?.winner || (!b.losers && b.winners[b.rounds-1][0]?.winner))
    ? `<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 no-print">
        <div class="bg-yellow-400 text-gray-900 px-6 py-3 rounded-full shadow-2xl font-bold text-lg">
          🏆 Champion: ${esc(b.grandFinal?.winner || b.winners[b.rounds-1][0]?.winner)}
        </div>
       </div>`
    : '';

  const exportDropdown = state.showExportDropdown ? `
    <div class="absolute right-0 mt-1 shadow-lg rounded-lg overflow-hidden z-50 border" style="background:${state.darkMode?'#1f2937':'white'};border-color:${state.darkMode?'#374151':'#e5e7eb'};min-width:150px;">
      <button onclick="exportTXT()" class="block w-full text-left px-4 py-2 whitespace-nowrap ${c('text-gray-100 hover:bg-gray-700','hover:bg-gray-100')}">📄 Text (.txt)</button>

        <div class="flex gap-2 flex-wrap items-center">
          ${coffeeBtn()}
          <button onclick="toggleDarkMode()" title="Toggle dark mode" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-2 rounded-lg">${state.darkMode?'☀️':'🌙'}</button>
          <button onclick="undoLastAction()" ${state.history.length===0?'disabled':''} title="Undo last action (Ctrl+Z)" class="bg-orange-600 hover:bg-orange-700 disabled:bg-gray-400 text-white px-3 py-2 rounded-lg">↶ Undo</button>

          <button onclick="openResetModal()" title="Reset entire tournament" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg">🔄 Reset</button>

    </div>

    <div class="max-w-7xl mx-auto p-2 md:p-4">

      <!-- Winners Bracket -->
      <div class="${card()} rounded-lg shadow-lg p-4 md:p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-center ${txt()}">Winners Bracket</h2>
        <div class="overflow-x-auto pb-4">
          <div class="flex gap-6 min-w-max">${wCols}</div>
        </div>
      </div>

      ${lbSection}
      ${grandFinalSection}

      <div class="print-only mt-8 text-center text-sm text-gray-500">
        Generated by BracketChamp ${VERSION} — ${new Date().toLocaleString()}
      </div>
    </div>

    ${modals}
    ${champBanner}
  </div>`;
}

// ─── ESCAPE HTML ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undoLastAction(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='p') { e.preventDefault(); window.print(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='e') { e.preventDefault(); if(state.bracket) exportTXT(); }
  // Close export dropdown on Escape
  if (e.key==='Escape') { state.showExportDropdown=false; state.showResetModal=false; render(); }
});

// Close export dropdown on outside click
document.addEventListener('click', e => {
  if (state.showExportDropdown && !e.target.closest('[onclick="toggleExportDropdown()"]') && !e.target.closest('.z-50')) {
    state.showExportDropdown = false; render();
  }
});

render();
</script>
</body>
</html>
